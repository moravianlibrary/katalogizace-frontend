      [disabled]="recordState.viewMode() === 'table'"
      (click)="toggleAddMenu($event)"
      type="button"
    >
      Přidat pole

        class="icon-primary-default"
        [class.icon-primary-disable]="recordState.viewMode() === 'table'"

        height="16"
        viewBox="0 0 16 16"

      >

    @if (showAddMenu()) {
      <div
        class="border-primary-default text-secondary absolute right-0 z-50 mt-2 overflow-hidden rounded-lg border bg-white shadow-md"
        (click)="$event.stopPropagation()"
      >
        <button
          class="hover:bg-main-light text-cemter w-full cursor-pointer px-4 py-2 text-sm"
          (click)="addControlField()"
          type="button"
        >
          Speciální pole
        </button>

        <button
          class="hover:bg-main-light w-full cursor-pointer px-4 py-2 text-center text-sm"
          (click)="addNormalField()"
          type="button"
        >
          Normální pole
        </button>
      </div>
    }

  <button
    class="bg-main-primary-default text-on-color disabled:bg-main-primary-disable text-sm-tight inline-flex gap-3 rounded-lg px-4 py-3 font-medium hover:cursor-pointer disabled:cursor-not-allowed"
    [disabled]="isSaving()"
    (click)="onSave()"
    type="button"
  >
    @if (isSaving()) {
      Ukládám…
    } @else {
      Uložit
    }
    <svg
      class="icon-on-color"
      width="16"
      height="16"
      viewBox="0 0 24 24"
      xmlns="http://www.w3.org/2000/svg"
    >
      <path
        fill-rule="evenodd"
        clip-rule="evenodd"
        d="M18.5529 7.5068C18.8328 7.20146 18.8121 6.72703 18.5068 6.44714C18.2015 6.16724 17.727 6.18787 17.4471 6.49321L9.75 14.8901L6.55287 11.4023C6.27298 11.097 5.79855 11.0763 5.49321 11.3562C5.18787 11.6361 5.16724 12.1105 5.44714 12.4159L9.19714 16.5068C9.3392 16.6618 9.53977 16.75 9.75 16.75C9.96023 16.75 10.1608 16.6618 10.3029 16.5068L18.5529 7.5068Z"
