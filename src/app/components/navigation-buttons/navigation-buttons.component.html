      class="bg-main-base text-secondary border-primary-default text-sm-tight inline-flex gap-3 rounded-lg border px-3.75 py-2.75 font-medium hover:cursor-pointer"
      (click)="toggleView()"
      type="button"
    >
      Přepnout zobrazení
      <svg
        class="icon-primary-default"
        width="16"
        height="16"
        viewBox="0 0 16 16"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          fill-rule="evenodd"
          clip-rule="evenodd"
          d="M2 4h12v1H2zM2 7h8v1H2zM2 10h12v1H2z"

    </button>

      (click)="addField()"
      type="button"
    >
      Přidat pole

        width="16"
        height="16"

      (click)="onSave()"
      type="button"
