<div class="flex flex-wrap gap-3 px-4 py-3.5">
  @for (it of items(); track it.action ?? it.tag) {
    <button
      class="bg-main-base border-tertiary-default hover:border-tertiary-hover active:border-tertiary-pressed group inline-flex items-center gap-2 rounded-lg border py-0.75 pr-3 pl-2 transition-colors duration-150 ease-in-out hover:cursor-pointer"
      (click)="onAdd(it)"
      type="button"
    >
      <svg
        class="icon-tertiary"
        xmlns="http://www.w3.org/2000/svg"
        width="20"
        height="20"
        viewBox="0 0 20 20"
      >
        <path
          fill-rule="evenodd"
          clip-rule="evenodd"
          d="M10 4.375C10.3452 4.375 10.625 4.65482 10.625 5V9.375H15C15.3452 9.375 15.625 9.65482 15.625 10C15.625 10.3452 15.3452 10.625 15 10.625H10.625V15C10.625 15.3452 10.3452 15.625 10 15.625C9.65482 15.625 9.375 15.3452 9.375 15V10.625H5C4.65482 10.625 4.375 10.3452 4.375 10C4.375 9.65482 4.65482 9.375 5 9.375H9.375V5C9.375 4.65482 9.65482 4.375 10 4.375Z"
        />
        <path
          fill-rule="evenodd"
          clip-rule="evenodd"
          d="M10 4.375C10.3452 4.375 10.625 4.65482 10.625 5V9.375H15C15.3452 9.375 15.625 9.65482 15.625 10C15.625 10.3452 15.3452 10.625 15 10.625H10.625V15C10.625 15.3452 10.3452 15.625 10 15.625C9.65482 15.625 9.375 15.3452 9.375 15V10.625H5C4.65482 10.625 4.375 10.3452 4.375 10C4.375 9.65482 4.65482 9.375 5 9.375H9.375V5C9.375 4.65482 9.65482 4.375 10 4.375Z"
        />
      </svg>

      <span class="text-md font-medium">
        @if (it.action === "add-field") {
          {{ it.label! | translate }}
        } @else {
          {{ it.tag?.toString() }}
        }
      </span>
    </button>
  }
</div>
