<div>
  <div
    class="border-bright flex items-center justify-between gap-2 border-b p-4"
  >
    <span class="text-md w-full font-medium">
      {{ "editing" | translate }}
    </span>

    <button
      class="btn btn-m btn-primary group"
      [disabled]="isSaving() || !canSaveRecord()"
      (click)="onSave()"
      type="button"
    >
      {{ "buttons.save_record" | translate }}

      <svg
        class="icon-primary"
        xmlns="http://www.w3.org/2000/svg"
        width="16"
        height="16"
        viewBox="0 0 16 16"
      >
        <path
          fill-rule="evenodd"
          clip-rule="evenodd"
          d="M12.3686 5.00437C12.5552 4.80081 12.5414 4.48453 12.3379 4.29793C12.1343 4.11133 11.818 4.12509 11.6314 4.32864L6.5 9.92656L4.36858 7.60137C4.18198 7.39781 3.8657 7.38406 3.66214 7.57066C3.45858 7.75725 3.44483 8.07354 3.63143 8.2771L6.13143 11.0044C6.22613 11.1077 6.35985 11.1665 6.5 11.1665C6.64016 11.1665 6.77388 11.1077 6.86858 11.0044L12.3686 5.00437Z"
          fill
        />
        <path
          fill-rule="evenodd"
          clip-rule="evenodd"
          d="M12.3686 5.00437C12.5552 4.80081 12.5414 4.48453 12.3379 4.29793C12.1343 4.11133 11.818 4.12509 11.6314 4.32864L6.5 9.92656L4.36858 7.60137C4.18198 7.39781 3.8657 7.38406 3.66214 7.57066C3.45858 7.75725 3.44483 8.07354 3.63143 8.2771L6.13143 11.0044C6.22613 11.1077 6.35985 11.1665 6.5 11.1665C6.64016 11.1665 6.77388 11.1077 6.86858 11.0044L12.3686 5.00437Z"
          fill
        />
      </svg>
    </button>
  </div>

  <app-quick-add [items]="quickAddItems()" (add)="onQuickAdd($event)" />
</div>
