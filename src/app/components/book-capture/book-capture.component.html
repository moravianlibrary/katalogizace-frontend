<div class="flex flex-col gap-4 p-4">
  <h2>Naskenujte knihu</h2>

  @if (!bookId()) {
    <div class="flex flex-col gap-5">
      <p class="text-light text-sm">
        Nejprve založte knihu. Poté se automaticky otevře kamera pro pořízení
        první stránky.
      </p>

      <div class="flex gap-4">
        <button
          class="bg-main-base border-tertiary-default hover:border-tertiary-hover active:border-tertiary-pressed text-sm-tight text-base-color cursor-pointer rounded-lg border px-4 py-3 font-medium"
          (click)="cancel()"
        >
          Zpět
        </button>

        <button
          class="bg-main-primary-default text-on-color hover:bg-main-primary-hover active:bg-main-primary-pressed text-sm-tight disabled:bg-main-primary-disable disabled:text-btn-primary-disable cursor-pointer rounded-lg px-4 py-3 font-medium disabled:cursor-not-allowed"
          [disabled]="isCreating()"
          (click)="startNewBook()"
        >
          {{
            isCreating() ? "Zakládám knihu…" : "Založit knihu a otevřít kameru"
          }}
        </button>
      </div>
    </div>
  } @else {
    <div class="flex flex-col gap-3">
      <video
        class="max-h-[70vh] w-full rounded bg-black"
        #video
        autoplay
        playsinline
      ></video>

      <canvas #canvas hidden></canvas>

      <div class="flex flex-wrap items-center gap-3">
        <button
          class="bg-main-primary-default text-on-color hover:bg-main-primary-hover active:bg-main-primary-pressed text-sm-tight cursor-pointer rounded-lg px-4 py-3 font-medium"
          [disabled]="isUploading() || isFinishing()"
          (click)="takePhoto()"
        >
          {{ isUploading() ? "Nahrávám…" : "Odfotit stránku" }}
        </button>

        <button
          class="bg-main-base text-error hover:bg-main-error hover:text-on-color border-error text-sm-tight cursor-pointer rounded-lg border px-4 py-3 font-medium"
          (click)="cancel()"
          type="button"
        >
          Zrušit
        </button>

        <button
          class="bg-main-base text-success hover:bg-main-success hover:text-on-color border-success text-sm-tight cursor-pointer rounded-lg border px-4 py-3 font-medium"
          [disabled]="isFinishing()"
          (click)="finish()"
        >
          {{ isFinishing() ? "Spouštím workflow…" : "Hotovo" }}
        </button>
      </div>

      <span>
        Počet naskenovaných stránek: <strong>{{ photoCount() }}</strong>
      </span>
    </div>
  }
</div>
