<div class="flex flex-col gap-4 p-4">
  <h1 class="text-xl font-semibold">Naskenovať knihu foťákom</h1>

  <div *ngIf="!bookId()">
    <button
      class="btn btn-primary"
      [disabled]="isCreating()"
      (click)="startNewBook()"
    >
      {{ isCreating() ? "Zakladám knihu…" : "Založiť knihu a otvoriť kameru" }}
    </button>
  </div>

  <div class="flex flex-col gap-3" *ngIf="bookId()">
    <video
      class="max-h-[70vh] w-full rounded bg-black"
      #video
      autoplay
      playsinline
    ></video>
    <canvas #canvas hidden></canvas>

    <div class="flex flex-wrap items-center gap-3">
      <button
        class="btn btn-primary"
        [disabled]="isUploading() || isFinishing()"
        (click)="takePhoto()"
      >
        {{ isUploading() ? "Nahrávam…" : "Odfotiť stránku" }}
      </button>

      <button
        class="btn btn-success"
        [disabled]="isFinishing() || photoCount() === 0"
        (click)="finish()"
      >
        {{ isFinishing() ? "Spúšťam workflow…" : "Hotovo" }}
      </button>

      <button class="btn btn-secondary" (click)="cancel()">Zrušiť</button>

      <span class="ml-auto" *ngIf="photoCount() > 0">
        Stránok odfotených: <strong>{{ photoCount() }}</strong>
      </span>
    </div>
  </div>
</div>
