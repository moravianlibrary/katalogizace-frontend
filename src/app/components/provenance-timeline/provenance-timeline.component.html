<section class="h-full min-h-0" data-testid="provenance-timeline">
  <div class="h-full overflow-auto pr-4">
    <div class="flex flex-col gap-6">
      @for (step of steps(); track $index) {
        <div class="flex flex-row gap-2">
          <div class="flex flex-col items-center gap-0.5">
            <div class="flex h-6.5 w-6.5 items-center justify-center">
              <div class="text-btn-secondary-default text-md font-bold">
                {{ $index + 1 }}.
              </div>
            </div>

            <div class="bg-main-bright w-1.5 flex-1 rounded-full"></div>
          </div>

          <div class="flex flex-col">
            <div class="text-lg font-medium">
              {{ step.kind | stepKindLabel }}
            </div>
            <p class="text-md">
              {{ step.description }}
            </p>
          </div>
        </div>
      } @empty {
        <p class="text-light text-sm">
          {{ "provenance.empty" | translate }}
        </p>
      }
    </div>
  </div>
</section>
