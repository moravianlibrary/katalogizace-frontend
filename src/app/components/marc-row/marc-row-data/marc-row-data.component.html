<td class="text-secondary text-md p-2 align-text-top font-bold">
  {{ df().tag }}
</td>

<td class="py-2 pr-2" colspan="5">
  <div class="flex items-start">
    <div class="mr-8 flex w-11 items-center justify-between">
      <div class="text-secondary text-md text-left">
        {{ df().ind1 }}
      </div>

      <div class="text-secondary text-md text-left">
        {{ df().ind2 }}
      </div>
    </div>

    <div class="min-w-0 flex-1">
      @if (subfieldsEnumerated().length) {
        <div class="flex flex-wrap gap-x-2 gap-y-1">
          @for (e of subfieldsEnumerated(); track $index) {
            <span [ngClass]="subDiffClass(subDiffKindAt($index))">
              <span class="text-secondary text-md font-bold"
                >|{{ e.sf.code }}</span
              >
              <span class="text-secondary text-md ml-2 wrap-anywhere">{{
                e.sf.value
              }}</span>
            </span>
          }
        </div>
      }
    </div>

    <div class="flex gap-3 px-2">
      @if (df().fieldId && (df().candidates?.length ?? 0) > 1) {
        <button
          class="cursor-pointer"
          (click)="onShowCandidates()"
          type="button"
        >
          <svg
            class="icon-secondary-default"
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 20 20"
          >
            <path
              fill-rule="evenodd"
              clip-rule="evenodd"
              d="M8.54167 16.2503C8.54167 15.9051 8.82149 15.6253 9.16667 15.6253H17.5C17.8452 15.6253 18.125 15.9051 18.125 16.2503C18.125 16.5955 17.8452 16.8753 17.5 16.8753H9.16667C8.82149 16.8753 8.54167 16.5955 8.54167 16.2503Z"
            />
            <path
              fill-rule="evenodd"
              clip-rule="evenodd"
              d="M8.54167 10.417C8.54167 10.0718 8.82149 9.79199 9.16667 9.79199H17.5C17.8452 9.79199 18.125 10.0718 18.125 10.417C18.125 10.7622 17.8452 11.042 17.5 11.042H9.16667C8.82149 11.042 8.54167 10.7622 8.54167 10.417Z"
            />
            <path
              fill-rule="evenodd"
              clip-rule="evenodd"
              d="M8.54167 4.58366C8.54167 4.23848 8.82149 3.95866 9.16667 3.95866H17.5C17.8452 3.95866 18.125 4.23848 18.125 4.58366C18.125 4.92884 17.8452 5.20866 17.5 5.20866H9.16667C8.82149 5.20866 8.54167 4.92884 8.54167 4.58366Z"
            />
            <path
              fill-rule="evenodd"
              clip-rule="evenodd"
              d="M6.27528 2.47505C6.51935 2.71913 6.51935 3.11486 6.27528 3.35893L3.77527 5.85893C3.5312 6.10301 3.13547 6.10301 2.89139 5.85893L2.05806 5.0256C1.81398 4.78152 1.81398 4.38579 2.05806 4.14172C2.30214 3.89764 2.69786 3.89764 2.94194 4.14172L3.33333 4.53311L5.39139 2.47505C5.63547 2.23097 6.0312 2.23097 6.27528 2.47505Z"
            />
            <path
              fill-rule="evenodd"
              clip-rule="evenodd"
              d="M6.27528 8.30838C6.51935 8.55246 6.51935 8.94819 6.27528 9.19227L3.77527 11.6923C3.5312 11.9363 3.13547 11.9363 2.89139 11.6923L2.05806 10.8589C1.81398 10.6149 1.81398 10.2191 2.05806 9.97505C2.30214 9.73097 2.69786 9.73097 2.94194 9.97505L3.33333 10.3664L5.39139 8.30838C5.63547 8.06431 6.0312 8.06431 6.27528 8.30838Z"
            />
            <path
              fill-rule="evenodd"
              clip-rule="evenodd"
              d="M6.27528 14.1417C6.51935 14.3858 6.51935 14.7815 6.27528 15.0256L3.77527 17.5256C3.5312 17.7697 3.13547 17.7697 2.89139 17.5256L2.05806 16.6923C1.81398 16.4482 1.81398 16.0525 2.05806 15.8084C2.30214 15.5643 2.69786 15.5643 2.94194 15.8084L3.33333 16.1998L5.39139 14.1417C5.63547 13.8976 6.0312 13.8976 6.27528 14.1417Z"
            />
          </svg>
        </button>
      }

      @if (df().selectedCandidateId && df().score) {
        <button
          class="border-base h-5 w-5 rounded-full border shadow hover:cursor-pointer"
          [ngClass]="scoreClass(df().score)"
          (click)="onShowProvenance()"
          type="button"
        ></button>
      }
    </div>
  </div>
</td>
