<table class="w-full border-collapse text-sm">
  <colgroup>
    <col class="w-16" />
    <col class="w-10" />
    <col class="w-10" />
    <col />
    <col class="w-10" />
    <col class="w-10" />
  </colgroup>

  <tbody>
    @if (transformed(); as rec) {
      @if (rec.leader) {
        <tr
          class="border-tertiary-default border-y-[0.5px]"
          [ngClass]="
            this.ds.enabledByUser() && this.recordState.viewMode() === 'table'
              ? 'opacity-60'
              : ''
          "
          [leader]="rec.leader"
          appMarcRowLeader
        ></tr>
      }

      @for (cf of rec.control_fields; track $index) {
        <tr
          class="border-tertiary-default border-b-[0.5px]"
          [ngClass]="[
            $index === 0 && !rec.leader ? 'border-t-[0.5px]' : '',
            this.ds.enabledByUser() &&
            !isDiffableTag015to830(cf.tag) &&
            this.recordState.viewMode() === 'table'
              ? 'opacity-60'
              : '',
          ]"
          [cf]="cf"
          appMarcRowControl
        ></tr>
      }

      @for (nf of rec.normal_fields; track $index) {
        @if (nf.tag != "910") {
          <tr
            class="border-tertiary-default border-b-[0.5px]"
            [ngClass]="[
              $index === 0 && rec.control_fields.length === 0 && !rec.leader
                ? 'border-t-[0.5px]'
                : '',
              this.ds.enabledByUser() &&
              !isDiffableTag015to830(nf.tag) &&
              this.recordState.viewMode() === 'table'
                ? 'opacity-60'
                : '',
            ]"
            [nf]="nf"
            [diffIndex]="diffIndex()"
            [diffSide]="diffSide()"
            appMarcRowNormal
          ></tr>
        }
      }
    } @else {
      <tr>
        <td class="text-light p-2 text-sm" colspan="6">
          Žádná data k zobrazení.
        </td>
      </tr>
    }
  </tbody>
</table>
