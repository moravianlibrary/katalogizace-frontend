<table class="w-full table-fixed border-collapse">
  <colgroup>
    <col class="w-25" />
    <col />
  </colgroup>

  <tbody
    class="[&>tr:nth-child(even)]:bg-main-base [&>tr:nth-child(odd)]:bg-gray-500/5"
  >
    @if (recordState.editableRecord()?.leader) {
      <tr
        class="border-light border-b"
        [ngClass]="
          this.ds.enabledByUser() && this.recordState.viewMode() === 'table'
            ? 'opacity-60'
            : ''
        "
        [leader]="recordState.editableRecord()?.leader!"
        appMarcRowLeader
      ></tr>
    }

    @for (
      cf of recordState.editableRecord()?.control_fields;
      track cf.fieldId
    ) {
      <tr
        class="border-light group cursor-pointer border-b"
        [ngClass]="[
          $index === 0 && !recordState.editableRecord()?.leader
            ? 'border-t-[0.5px]'
            : '',
          this.ds.enabledByUser() &&
          !isDiffableTag015to830(cf.tag) &&
          this.recordState.viewMode() === 'table'
            ? 'opacity-60'
            : '',
        ]"
        [cf]="cf"
        [editable]="true"
        (click)="
          cps.setMode('edit', { tag: cf.tag, fieldId: cf.fieldId });
          recordState.selectField(cf.fieldId)
        "
        (click)="
          cps.enterEdit({
            kind: 'control',
            fieldId: cf.fieldId,
            tag: cf.tag,
            value: cf.value,
          });
          recordState.selectField(cf.fieldId)
        "
        appMarcRowControl
      ></tr>
    }

    @for (df of recordState.editableRecord()?.data_fields; track df.fieldId) {
      @if (df.tag != "910") {
        <tr
          class="border-light group cursor-pointer border-b"
          [ngClass]="[
            $index === 0 &&
            recordState.editableRecord()?.control_fields?.length === 0 &&
            !recordState.editableRecord()?.leader
              ? 'border-t-[0.5px]'
              : '',
            this.ds.enabledByUser() &&
            !isDiffableTag015to830(df.tag) &&
            this.recordState.viewMode() === 'table'
              ? 'opacity-60'
              : '',
          ]"
          [df]="df"
          [diffIndex]="diffIndex()"
          [diffSide]="diffSide()"
          [editable]="true"
          (click)="
            cps.enterEdit({
              kind: 'data',
              fieldId: df.fieldId,
              tag: df.tag,
              ind1: df.ind1,
              ind2: df.ind2,
              subfields: df.subfields,
            });
            recordState.selectField(df.fieldId)
          "
          appMarcRowData
        ></tr>
      }
    }
  </tbody>
</table>
