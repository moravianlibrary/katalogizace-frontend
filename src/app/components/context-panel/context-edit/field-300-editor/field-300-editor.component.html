<section class="bg-main-base flex h-full flex-col rounded-2xl">
  <div class="flex-1 overflow-auto">
    <div
      class="border-light flex items-center justify-between gap-4 border-b px-4 pt-4 pb-6"
    >
      <div class="w-full">
        <label class="text-light text-sm-tight mb-2 block font-medium">
          {{ "field_edit.first_indicator" | translate }}
        </label>

        <app-input-dropdown
          [value]="field()?.ind1 ?? ''"
          [options]="ind1Options()"
          (valueChange)="setInd(1, $event)"
        />
      </div>

      <div class="w-full">
        <label class="text-light text-sm-tight mb-2 block font-medium">
          {{ "field_edit.second_indicator" | translate }}
        </label>

        <app-input-dropdown
          [value]="field()?.ind2 ?? ''"
          [options]="ind2Options()"
          (valueChange)="setInd(2, $event)"
        />
      </div>
    </div>

    <div class="space-y-6 p-4">
      @for (
        sf of visibleSubfields();
        track sf.kind + "-" + sf.code + "-" + $index
      ) {
        <div>
          <label class="text-light text-sm-tight mb-2 block font-medium">
            {{ getSubfieldLabel(sf.code) | translate }}
          </label>

          <span
            class="border-tertiary-default focus-within:border-primary-default bg-main-base inline-flex w-full overflow-hidden rounded-lg border"
          >
            <input
              class="w-full bg-transparent py-3 pl-4 outline-none"
              #plainInput
              [value]="sf.value"
              (input)="
                sf.kind === 'template'
                  ? setTemplateSubValue(sf, plainInput.value)
                  : sf.sourceIndex !== null &&
                    setExtraSubValue(sf.sourceIndex, plainInput.value)
              "
            />

            @if (sf.kind === "template") {
              @if (sf.value.length) {
                <button
                  class="group flex items-center px-3"
                  (click)="setTemplateSubValue(sf, '')"
                  (mousedown)="$event.preventDefault()"
                  tabindex="-1"
                  type="button"
                >
                  <svg
                    class="icon-tertiary"
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    viewBox="0 0 16 16"

                </button>
              }
            } @else if (sf.kind === "extra") {
              @if (sf.value.length) {
                <button
                  class="group flex items-center px-3"
                  (click)="
                    sf.sourceIndex !== null &&
                      setExtraSubValue(sf.sourceIndex, '')
                  "
                  (mousedown)="$event.preventDefault()"
                  tabindex="-1"
                  type="button"
                >
                  <svg
                    class="icon-tertiary"
                    xmlns="http://www.w3.org/2000/svg"

                    />
                  </svg>
                </button>
              } @else {
                <button
                  class="group flex items-center px-3"
                  (click)="
                    sf.sourceIndex !== null &&
                      deleteExtraSubfield(sf.sourceIndex)
                  "
                  (mousedown)="$event.preventDefault()"
                  tabindex="-1"
                  type="button"
                >
                  <svg
                    class="icon-btn-error"
                    xmlns="http://www.w3.org/2000/svg"

  </div>

  <div
    class="bg-main-base border-light sticky bottom-0 z-10 flex justify-center rounded-b-2xl border-t px-4 py-3"
  >
    <button
      class="btn btn-m btn-tertiary group items-center justify-center"
      (click)="openAddSubfieldDialog()"
      type="button"
    >
      <svg
        class="icon-secondary"
        xmlns="http://www.w3.org/2000/svg"
        width="20"
        height="20"
        viewBox="0 0 24 24"
      >
        <path
          fill-rule="evenodd"
          clip-rule="evenodd"
          d="M12 5.25C12.4142 5.25 12.75 5.58579 12.75 6V11.25H18C18.4142 11.25 18.75 11.5858 18.75 12C18.75 12.4142 18.4142 12.75 18 12.75H12.75V18C12.75 18.4142 12.4142 18.75 12 18.75C11.5858 18.75 11.25 18.4142 11.25 18V12.75H6C5.58579 12.75 5.25 12.4142 5.25 12C5.25 11.5858 5.58579 11.25 6 11.25H11.25V6C11.25 5.58579 11.5858 5.25 12 5.25Z"
        />
      </svg>
      <span>{{ "field_edit.add_subfield" | translate }}</span>
    </button>
  </div>

  <app-add-subfield-dialog
    [open]="addSubfieldDialogOpen()"
    [error]="addSubfieldDialogError()"
    (closed)="closeAddSubfieldDialog()"
    (clearedError)="addSubfieldDialogError.set(null)"
    (confirmed)="onAddSubfieldConfirm($event)"
  />
</section>
