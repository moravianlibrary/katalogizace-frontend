<section class="bg-main-base flex h-full flex-col rounded-2xl">
  <div class="flex-1 overflow-auto p-4">
    <label class="text-light text-sm-tight mb-2 block font-medium">
      {{ "field_edit.500.a" | translate }}
    </label>

    <app-textarea-autocomplete
      [value]="getA()"
      [field]="'500'"
      [subfield]="'a'"
      [bases]="['NKC', 'SKC', 'SCK']"
      [minChars]="1"
      [limit]="20"
      (valueChange)="setA($event)"
    />
  </div>
</section>
