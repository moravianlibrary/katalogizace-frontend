<section class="bg-main-base flex h-full flex-col rounded-2xl">
  <div
    class="border-light flex items-center justify-between gap-4 border-b px-4 pt-4 pb-6"
  >
    <div class="w-full">
      <label class="text-light text-sm-tight mb-2 block font-medium">
        {{ "field_edit.first_indicator" | translate }}
      </label>

      <app-input-dropdown
        [value]="field()?.ind1 ?? ''"
        [options]="ind1Options()"
        [disabled]="locked()"
        (valueChange)="setInd(1, $event)"
      />
    </div>

    <div class="w-full">
      <label class="text-light text-sm-tight mb-2 block font-medium">
        {{ "field_edit.second_indicator" | translate }}
      </label>

      <app-input-dropdown
        [value]="field()?.ind2 ?? ''"
        [options]="ind2Options()"
        [disabled]="locked()"
        (valueChange)="setInd(2, $event)"
      />
    </div>
  </div>

  <div class="flex-1 space-y-6 overflow-auto p-4">
    @for (
      sf of visibleSubfields();
      track sf.kind + "-" + sf.code + "-" + $index
    ) {
      <div>
        <label
          class="text-sm-tight text-light mb-2 flex justify-between font-medium"
        >
          {{ getSubfieldLabel(sf.code) | translate }}

          @if (sf.code === "7" && catalogueUrlSeven()) {
            <a
              class="text-base-color text-sm-tight font-medium underline hover:no-underline"
              [href]="catalogueUrlSeven()"
              target="_blank"
              rel="noopener noreferrer"
              title="{{ 'candidates.open_in_skc' | translate }}"
            >
              <span class="flex items-center gap-1">
                {{ "candidates.show_in_nkp" | translate }}
                <svg
                  class="icon-black"
                  appIcon="externalLink"
                  width="16"
                  height="16"
                ></svg>
              </span>
            </a>
          }
        </label>

        @if (sf.code === "2") {
          <app-input-dropdown
            [value]="dictionary()"
            [placeholder]="'-'"
            [options]="DICT_OPTIONS"
            [disabled]="locked()"
            (valueChange)="onDictionaryChange($event)"
          />
        } @else if (sf.code === "a") {
          @if (hasDictionary()) {
            <app-input-autocomplete-dictionary
              [value]="sf.value"
              [dictionary]="autocompleteDictionary()"
              [disabled]="locked()"
              [minChars]="1"
              [limit]="20"
              [fieldType]="fieldType()"
              (valueChange)="onPickTerm($event)"
              (picked)="applySuggestion($event)"
            />
          } @else {
            <app-input-autocomplete
              [value]="sf.value"
              [field]="tag()"
              [subfield]="sf.code"
              [bases]="['NKC', 'SKC', 'SCK']"
              [minChars]="1"
              [limit]="20"
              [disabled]="locked()"
              (valueChange)="setTemplateSub('a', $event)"
            />
          }
        } @else if (sf.code === "7") {
          <span
            class="inline-flex w-full overflow-hidden rounded-lg border"
            [ngClass]="
              locked()
                ? 'border-tertiary-disable bg-gray-500/5'
                : 'border-tertiary-default bg-main-base'
            "
          >
            <input
              class="text-disable w-full cursor-not-allowed bg-transparent py-3 pl-4 font-medium outline-none"
              [value]="sf.value"
              disabled
            />

            @if (sf.value.length) {
              <button
                class="group mx-3 flex cursor-pointer items-center"
                (click)="clearAuthority()"
                (mousedown)="$event.preventDefault()"
                tabindex="-1"
                type="button"
              >
                <app-lock-hover-icon></app-lock-hover-icon>
              </button>
            }
          </span>
        } @else {
          <div class="relative">
            <app-input-autocomplete
              [value]="sf.value"
              [field]="tag()"
              [subfield]="sf.code"
              [bases]="['NKC', 'SKC', 'SCK']"
              [minChars]="1"
              [limit]="20"
              (valueChange)="
                sf.sourceIndex !== null &&
                  setExtraSubValue(sf.sourceIndex, $event)
              "
            />

            @if (!sf.value.length) {
              <button
                class="group absolute top-1/2 right-3 -translate-y-1/2 cursor-pointer"
                (click)="
                  sf.sourceIndex !== null && deleteExtraSubfield(sf.sourceIndex)
                "
                (mousedown)="$event.preventDefault()"
                tabindex="-1"
                type="button"
              >
                <svg
                  class="icon-btn-error"
                  appIcon="trash"
                  width="16"
                  height="16"
                ></svg>
              </button>
            }
          </div>
        }
      </div>
    }
  </div>

  <div
    class="bg-main-base border-light z-10 flex justify-center rounded-b-2xl border-t px-4 py-3"
  >
    <button
      class="btn btn-m btn-tertiary group items-center justify-center"
      (click)="openAddSubfieldDialog()"
      type="button"
    >
      <svg class="icon-secondary" appIcon="add" width="20" height="20"></svg>
      <span>{{ "field_edit.add_subfield" | translate }}</span>
    </button>
  </div>

  <app-add-subfield-dialog
    [open]="addSubfieldDialogOpen()"
    [error]="addSubfieldDialogError()"
    (closed)="closeAddSubfieldDialog()"
    (clearedError)="addSubfieldDialogError.set(null)"
    (confirmed)="onAddSubfieldConfirm($event)"
  />
</section>
