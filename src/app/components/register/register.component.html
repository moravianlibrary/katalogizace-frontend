<div class="flex min-h-[calc(100vh-2rem)] items-center justify-center p-4">
  <div
    class="border-tertiary-default w-full max-w-md rounded-2xl border bg-white p-6 shadow-sm sm:p-8"
  >
    <div class="mb-6">
      <h2>Registrace</h2>
      <p class="text-light mt-1 text-sm">
        Vytvořte si účet a poté se přihlaste.
      </p>
    </div>

    <form class="space-y-4" [formGroup]="form" (ngSubmit)="submit()">
      <div>
        <label class="text-light mb-1 block text-sm font-medium"> Jméno </label>
        <input
          class="border-bright placeholder:text-disable hover:border-tertiary-hover focus:border-tertiary-pressed w-full rounded-xl border px-3 py-2 outline-none"
          [class.border-error]="fullNameInvalid()"
          type="text"
          formControlName="full_name"
          autocomplete="name"
          placeholder="Jan Novák"
        />
        @if (fullNameInvalid()) {
          <p class="text-error mt-1 text-sm">Jméno je povinné.</p>
        }
      </div>

      <div>
        <label class="text-light mb-1 block text-sm font-medium">
          E-mail
        </label>
        <input
          class="border-bright placeholder:text-disable hover:border-tertiary-hover focus:border-tertiary-pressed w-full rounded-xl border px-3 py-2 outline-none"
          [class.border-error]="emailInvalid()"
          type="email"
          formControlName="email"
          autocomplete="username"
          placeholder="name@example.com"
        />
        @if (emailInvalid()) {
          <p class="text-error mt-1 text-sm">
            Zadejte platnou e-mailovou adresu.
          </p>
        }
      </div>

      <div>
        <label class="mb-1 block text-sm font-medium text-gray-700">
          Heslo
        </label>
        <input
          class="border-bright placeholder:text-disable hover:border-tertiary-hover focus:border-tertiary-pressed w-full rounded-xl border px-3 py-2 outline-none"
          [class.border-error]="passwordInvalid()"
          type="password"
          formControlName="password"
          autocomplete="new-password"
          placeholder="••••••••"
        />
        @if (passwordInvalid()) {
          <p class="text-error mt-1 text-sm">Heslo je povinné.</p>
        }
      </div>

      <button
        class="bg-main-primary-default text-on-color hover:bg-main-primary-hover disabled:bg-main-primary-disable disabled:text-btn-primary-disable w-full cursor-pointer rounded-xl px-4 py-2 font-medium disabled:cursor-not-allowed"
        [disabled]="loading() || form.invalid"
        type="submit"
      >
        @if (loading()) {
          <span>Vytvářím…</span>
        } @else {
          <span>Vytvořit účet</span>
        }
      </button>

      <div class="text-secondary pt-2 text-center text-sm">
        Už máte účet?
        <a class="text-link font-medium hover:underline" routerLink="/login">
          Přihlaste se
        </a>
      </div>
    </form>
  </div>
</div>
