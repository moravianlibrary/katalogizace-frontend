@if (open()) {
  <div
    class="fixed inset-0 z-110 flex items-center justify-center bg-black/40 p-4"
    data-testid="generated-password-dialog"
    (window:keydown.escape)="onEscape()"
  >
    <section
      class="shadow-s w-[calc(100vw-2rem)] max-w-xl overflow-hidden rounded-2xl bg-white"
      (click)="$event.stopPropagation()"
      role="dialog"
      aria-modal="true"
      aria-labelledby="generated-password-dialog-title"
    >
      <div class="flex max-h-[calc(100dvh-2rem)] flex-col">
        <div
          class="border-bright flex shrink-0 justify-between gap-3 border-b px-4 py-3"
        >
          <span
            class="text-base-color text-xl font-medium"
            id="generated-password-dialog-title"
          >
            {{ titleKey() | translate }}
          </span>

          <button
            class="btn group"
            [disabled]="locked()"
            (click)="requestClose()"
            type="button"
          >
            <svg
              class="icon-tertiary group-disabled:icon-tertiary-disable"
              appIcon="x"
              width="24"
              height="24"
            ></svg>
          </button>
        </div>

        <div class="px-4 py-4">
          <div class="text-error text-sm-tight flex items-center gap-2">
            <svg
              class="icon-error"
              appIcon="warningCircle"
              width="20"
              height="20"
            ></svg>

            <span>
              {{ "users.one_time_password_warning" | translate }}
            </span>
          </div>

          <div
            class="border-tertiary-default focus-within:border-primary-default bg-main-base relative mt-4 flex h-12 items-center gap-3 rounded-lg border px-3 pr-12"
          >
            <span
              class="bg-main-light flex h-8 w-8 shrink-0 items-center justify-center rounded-full"
            >
              <svg
                class="icon-tertiary"
                appIcon="lockPassword"
                width="16"
                height="16"
              ></svg>
            </span>

            <input
              class="text-base-color min-w-0 flex-1 bg-transparent outline-none"
              data-testid="generated-password-input"
              [value]="password()"
              readonly
              type="text"
            />

            <div class="absolute top-3 right-3 z-10 flex items-center gap-2">
              @if (passwordCopied()) {
                <span
                  class="bg-main-base text-secondary rounded-md px-2 py-1 text-xs shadow-sm"
                >
                  {{ "labels.copied" | translate }}
                </span>
              }

              <button
                class="group flex cursor-pointer items-center justify-center disabled:cursor-not-allowed"
                [disabled]="!password()"
                [attr.aria-label]="'buttons.copy' | translate"
                (click)="copyPassword()"
                type="button"
              >
                @if (passwordCopied()) {
                  <svg
                    class="icon-tertiary"
                    appIcon="check"
                    width="24"
                    height="24"
                  ></svg>
                } @else {
                  <svg
                    class="icon-tertiary"
                    appIcon="copy"
                    width="20"
                    height="20"
                  ></svg>
                }
              </button>
            </div>
          </div>
        </div>

        <div
          class="border-bright flex shrink-0 justify-center gap-3 border-t px-4 py-3"
        >
          <button
            class="btn btn-m btn-primary"
            data-testid="generated-password-close"
            [disabled]="locked()"
            (click)="requestClose()"
            type="button"
          >
            {{ "buttons.understand" | translate }}
          </button>
        </div>
      </div>
    </section>
  </div>
}
