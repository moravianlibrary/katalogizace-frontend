@if (confirmDialog.open()) {
  <div
    class="fixed inset-0 z-100 flex items-center justify-center bg-black/40 p-4"
    (click)="confirmDialog.cancel()"
    (window:keydown.escape)="confirmDialog.cancel()"
    data-testid="confirm-dialog"
  >
    <section
      class="shadow-s w-[calc(100vw-2rem)] max-w-xl overflow-hidden rounded-2xl bg-white"
      (click)="$event.stopPropagation()"
      role="dialog"
      aria-modal="true"
      aria-labelledby="confirm-dialog-title"
    >
      <div class="flex flex-col">
        <div class="flex shrink-0 justify-between gap-4 px-4 pt-4">
          <span class="text-xl font-medium" id="confirm-dialog-title">
            {{ confirmDialog.title() }}
          </span>

          <button
            class="btn group shrink-0"
            (click)="confirmDialog.cancel()"
            type="button"
          >
            <svg class="icon-tertiary" appIcon="x" width="24" height="24"></svg>
          </button>
        </div>

        @if (confirmDialog.note(); as note) {
          <div class="p-4">
            {{ note }}
          </div>
        }

        <div class="border-bright flex justify-center gap-3 border-t px-4 py-3">
          <button
            class="btn btn-m btn-tertiary"
            (click)="confirmDialog.cancel()"
            data-testid="confirm-dialog-cancel"
            type="button"
          >
            {{ "buttons.cancel" | translate }}
          </button>

          <button
            class="btn btn-m"
            [ngClass]="confirmButtonClass()"
            (click)="confirmDialog.accept()"
            data-testid="confirm-dialog-confirm"
            type="button"
          >
            {{ confirmDialog.confirmLabel() }}
          </button>
        </div>
      </div>
    </section>
  </div>
}
