<div class="relative w-full">
  <svg
    class="icon-tertiary pointer-events-none absolute top-1/2 left-4 -translate-y-1/2"
    appIcon="search"
    width="16"
    height="16"
  ></svg>

  <input
    class="border-tertiary-default bg-main-base focus:border-primary-default text-secondary h-12 w-full rounded-lg border pr-4 pl-10 outline-none"
    [value]="value()"
    [placeholder]="placeholderKey() | translate"
    (input)="onInput($event)"
    type="text"
  />
</div>
