<button
  class="group relative flex cursor-pointer items-center gap-1 select-none"
  [attr.aria-expanded]="open()"
  [attr.data-testid]="testId()"
  (click)="toggle($event)"
  aria-haspopup="dialog"
  type="button"
>
  <span>{{ labelKey() | translate }}</span>

  <svg class="icon-secondary" appIcon="filter" width="16" height="16"></svg>

  @if (active()) {
    <span
      class="absolute top-0.5 -right-0.5 h-2 w-2 rounded-full border border-white bg-green-600"
    ></span>
  }
</button>

@if (open() && position()) {
  <div
    [attr.data-testid]="testId() ? testId() + '-backdrop' : null"
    class="fixed inset-0 z-50"
    (click)="close()"
    (window:keydown.escape)="close()"
  >
    <div
      [attr.data-testid]="testId() ? testId() + '-panel' : null"
      class="border-primary-default bg-main-base shadow-s absolute rounded-lg border p-4"
      [ngClass]="panelWidthClass()"
      [style.top.px]="position()!.top"
      [style.left.px]="position()!.left"
      (click)="$event.stopPropagation()"
    >
      <div class="flex flex-col gap-4">
        @for (option of options(); track $index) {
          <label
            class="flex cursor-pointer items-center gap-3"
            [attr.data-testid]="optionTestId(option.value)"
          >
            <input
              class="peer sr-only"
              [checked]="value() === option.value"
              [name]="radioName()"
              (change)="select(option.value)"
              type="radio"
            />

            <span
              class="border-contrast peer-hover:border-primary-hover peer-active:border-primary-pressed after:bg-main-contrast peer-hover:after:bg-primary-hover peer-active:after:bg-primary-pressed peer-checked:border-primary-default peer-checked:after:bg-main-primary-default peer-checked:peer-hover:border-primary-hover peer-checked:peer-hover:after:bg-main-primary-hover peer-checked:peer-active:border-primary-pressed peer-checked:peer-active:after:bg-main-primary-pressed relative flex h-4 w-4 items-center justify-center rounded-full border transition-colors after:absolute after:h-2.5 after:w-2.5 after:scale-0 after:rounded-full after:transition-transform after:content-[''] peer-checked:after:scale-100"
            ></span>

            <span>{{ option.labelKey | translate }}</span>
          </label>
        }
      </div>
    </div>
  </div>
}
