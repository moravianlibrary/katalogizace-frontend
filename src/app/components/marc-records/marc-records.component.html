<section class="flex h-full flex-col">
  <h2 class="mb-5">Záznamy</h2>
  <div class="border-tertiary-default flex overflow-x-auto border-b-[0.5px]">
    @if (records().length) {
      @for (rec of records(); track $index) {
        <button
          class="bg-main-light text-md cursor-pointer p-4 font-medium"
          [class.rounded-tl-lg]="$index === 0"
          [class.rounded-tr-lg]="$index + 1 === records().length"
          [class.border-b-3]="activeIndex() === $index"
          [class.border-primary-default]="activeIndex() === $index"
          [class.text-secondary]="activeIndex() === $index"
          [class.text-light]="activeIndex() !== $index"
          (click)="setActive($index)"
          type="button"
        >
          {{ $index === 0 ? "Vyčtený" : "Nalezený " + $index }}
        </button>
      }
    } @else {
      <div class="text-md text-light p-4">Žádné záznamy</div>
    }
  </div>

  <div class="flex-1 overflow-auto">
    @if (records().length) {
      <app-marc-record-table [record]="records()[activeIndex()]" />
    }
  </div>

  @if (records().length && activeIndex() != 0) {
    <div class="mt-4 flex justify-end">
      <button
        class="bg-main-primary-default text-on-color text-sm-tight cursor-pointer rounded-lg px-4 py-3 font-medium"
        type="button"
      >
        Převzít celý záznam
      </button>
    </div>
  }
</section>
