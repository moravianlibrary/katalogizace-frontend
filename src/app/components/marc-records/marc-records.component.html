<section class="flex h-full flex-col">
  <h2 class="mb-5">Záznamy</h2>
  <div class="flex overflow-x-auto border-b-[0.5px] border-gray-500">
    @if (records().length) {
      @for (rec of records(); track $index) {
        <button
          class="text-md cursor-pointer bg-gray-100 p-4 font-medium"
          [class.rounded-tl-lg]="$index === 0"
          [class.rounded-tr-lg]="$index + 1 === records().length"
          [class.border-b-3]="activeIndex() === $index"
          [class.border-[#30B0C7]]="activeIndex() === $index"
          [class.text-gray-800]="activeIndex() === $index"
          [class.text-gray-600]="activeIndex() !== $index"
          (click)="setActive($index)"
          type="button"
        >
          {{ $index === 0 ? "Vyčtený" : "Nalezený " + $index }}
        </button>
      }
    } @else {
      <div class="p-4 text-sm text-gray-600">Žádné záznamy</div>
    }
  </div>

  <div class="flex-1 overflow-auto">
    @if (records().length) {
      <app-marc-record-table [record]="records()[activeIndex()]" />
    }
  </div>

  @if (records().length && activeIndex() != 0) {
    <div class="mt-4 flex justify-end">
      <button
        class="text-md cursor-pointer rounded-lg bg-[#30B0C7] px-4 py-3 font-medium text-white"
        type="button"
      >
        Převzít celý záznam
      </button>
    </div>
  }
</section>
