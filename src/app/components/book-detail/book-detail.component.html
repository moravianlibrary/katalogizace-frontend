<section
  class="grid h-full min-h-0 grid-cols-1 gap-4 p-4 md:grid-cols-3"
  [class.md:grid-cols-[10rem_1fr_1fr]]="galleryCollapsed()"
  data-testid="book-detail-page"
>
  <app-gallery-panel
    class="h-full min-h-0 overflow-hidden"
    [bookId]="bookId()"
    [images]="images()"
    (collapsedChange)="onGalleryCollapsedChange($event)"
    data-testid="gallery-panel"
  />

  <app-main-panel
    class="h-full min-h-0 overflow-hidden"
    [book_id]="bookId()"
    [canWrite]="canWrite()"
    [canExport]="canExport()"
    [batchName]="batchName()"
  />

  <app-context-panel
    class="h-full min-h-0 overflow-hidden"
    [bookId]="bookId()"
    [canWrite]="canWrite()"
  />
</section>
